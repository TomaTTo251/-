name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pynput

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name AutoClickToggle autoclicker.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoClickToggle
          path: dist/AutoClickToggle.exe
